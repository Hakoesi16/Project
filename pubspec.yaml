  percent_indicator: ^4.2.3
  timelines_plus: ^2.0.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4
  share_plus: ^12.0.2
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.68.0

dev_dependencies:
