name: projetsndcp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  google_sign_in: ^6.0.1
  flutter_facebook_auth: ^6.0.0
  checkmark: ^0.0.2+1
  equatable: ^2.0.7
  image_picker: ^1.0.7
  timelines: ^0.1.0
  # Versions stables corrigées ici :
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
     - images/Logo2.png
     - images/google.png
     - images/facebook.png
     - images/serdina.jpg
     - images/sea.png
     - images/fish1.png
     - images/fish2.png
     - images/fish3.jpg

  fonts:
   - family: Inter
     fonts:
       - asset: fonts/Inter-VariableFont_opsz,wght.ttf
