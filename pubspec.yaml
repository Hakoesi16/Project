name: projetsndcp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  google_sign_in: ^6.0.1
  flutter_facebook_auth: ^6.0.0
  checkmark: ^0.0.2+1
  equatable: ^2.0.7
